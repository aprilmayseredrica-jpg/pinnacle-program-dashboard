          if (typeof aVal === 'number' && typeof bVal === 'number') {
            return config.direction === 'asc' ? aVal - bVal : bVal - aVal;
          }
          aVal = aVal ? aVal.toString().toLowerCase() : '';
          bVal = bVal ? bVal.toString().toLowerCase() : '';
          if (aVal < bVal) return config.direction === 'asc' ? -1 : 1;
          if (aVal > bVal) return config.direction === 'asc' ? 1 : -1;

        const total = filteredCancellations.length;
        if (total === 0) return { nodes: [], links: [] };

        const cols = [
          { key: 'dept', label: 'Department Trigger', x: 40, width: 140 },
          { key: 'risk', label: 'Operational Risk (Failure)', x: 340, width: 160 },
          { key: 'resolution', label: 'Final Outcome', x: 640, width: 120 }

        const stageNodes = { dept: {}, risk: {}, resolution: {} };
        filteredCancellations.forEach(item => {
          stageNodes.dept[item.dept] = (stageNodes.dept[item.dept] || 0) + 1;
          stageNodes.risk[item.risk] = (stageNodes.risk[item.risk] || 0) + 1;
          stageNodes.resolution[item.resolution || 'Resolved'] = (stageNodes.resolution[item.resolution || 'Resolved'] || 0) + 1;
        });

        const nodes = [];
        const nodeIndexMap = {};
        let nodeGlobalIdx = 0;

        cols.forEach((col, colIdx) => {
          const keys = Object.keys(stageNodes[col.key]).sort((a, b) => stageNodes[col.key][b] - stageNodes[col.key][a]);
          const colTotalCount = keys.reduce((sum, k) => sum + stageNodes[col.key][k], 0);

          let currentY = 20;
          const heightMultiplier = 280 / colTotalCount;
          const spacing = 10;

          keys.forEach((key) => {
            const count = stageNodes[col.key][key];
            const h = Math.max(count * heightMultiplier - spacing, 14);
            const node = {
              id: `${col.key}:${key}`, globalIdx: nodeGlobalIdx, label: key,
              stage: col.key, colIdx, count, x: col.x, width: col.width,
              y: currentY, height: h, sourceOffset: 0, targetOffset: 0
            };
            nodes.push(node);
            nodeIndexMap[node.id] = node;
            nodeGlobalIdx++;
            currentY += h + spacing;
          });
        });

        const links = [];
        const s01Flows = {};
        const s12Flows = {};

        filteredCancellations.forEach(item => {
          const id0 = `dept:${item.dept}`;
          const id1 = `risk:${item.risk}`;
          const id2 = `resolution:${item.resolution || 'Resolved'}`;
          const key01 = `${id0}->${id1}`;
          const key12 = `${id1}->${id2}`;
          s01Flows[key01] = (s01Flows[key01] || 0) + 1;
          s12Flows[key12] = (s12Flows[key12] || 0) + 1;
        });

        const buildLink = (sourceId, targetId, count) => {
          const sNode = nodeIndexMap[sourceId];
          const tNode = nodeIndexMap[targetId];
          if (!sNode || !tNode) return;
          const scaleSource = sNode.height / sNode.count;
          const scaleTarget = tNode.height / tNode.count;

          const link = {
            id: `${sourceId}->${targetId}`, source: sNode, target: tNode, count,
            thickness: Math.max(count * scaleSource, 3),
            sourceY: sNode.y + sNode.sourceOffset + (count * scaleSource) / 2,
            targetY: tNode.y + tNode.targetOffset + (count * scaleTarget) / 2
          };
          sNode.sourceOffset += count * scaleSource;
          tNode.targetOffset += count * scaleTarget;
          links.push(link);
        };

        Object.entries(s01Flows).forEach(([flowKey, count]) => {
          const [sourceId, targetId] = flowKey.split('->');
          buildLink(sourceId, targetId, count);
        });

        Object.entries(s12Flows).forEach(([flowKey, count]) => {
          const [sourceId, targetId] = flowKey.split('->');
          buildLink(sourceId, targetId, count);
        });

        return { nodes, links };
      }, [filteredCancellations]);

                                    if (node.stage === 'dept') setSelectedDept(node.label);
                                    else if (node.stage === 'resolution') setSelectedResolution(node.label);
                                  }}
                                  className="cursor-pointer"
                                >
                                  <rect
                                    x={node.x} y={node.y} width={node.width} height={node.height} rx="3"
                                    className="transition-all duration-150 shadow-sm"
                                    style={{ fill: fillStyle.split(' ')[0].replace('fill-', ''), stroke: fillStyle.split(' ')[1].replace('stroke-', '') }}
                                  />
                                  <text x={node.x + 8} y={node.y + node.height / 2 + 3} className={`text-[9px] pointer-events-none select-none ${labelStyle}`}>
                                    {node.label.length > 20 ? `${node.label.slice(0, 18)}...` : node.label} ({node.count})
                                  </text>
                                </g>
                              );
                            })}
                          </g>
                        </svg>
                      </div>
                    )}
                  </div>
                </div>
              </div>

    const root = ReactDOM.createRoot(document.getElementById('root'));
