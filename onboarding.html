  <!-- ==========================================
       PURE JAVASCRIPT DATA ENGINE
       Isolated from Babel to prevent compiler memory crashes.
       Maps exactly to CSV parameters & ROCK Q1C2025 logic.
       ========================================== -->
  <script>
    window.MMM_DATA = {};

    window.MMM_DATA.HISTORICAL_SUMMARY = {
      '2023': { starts: 200, cxls: 75, rate: 37.5 },
      '2024': { starts: 259, cxls: 67, rate: 25.9 },
      '2025': { starts: 197, cxls: 43, rate: 21.8 },
      '2026': { starts: 77, cxls: 17, rate: 22.1 }
    };

    window.MMM_DATA.SURVEY_SNAPSHOT = [
      { client: 'Dr. Danilo Coite', specialist: 'Jason Valeros', productivity: 5, confidence: 5, kpi: 4, tools: 5, checkins: 5, overall: 5, quote: "Onboarding process is very effective. 5/5" },
      { client: 'Michaela Klose', specialist: 'Jason Valeros', productivity: 5, confidence: 5, kpi: 5, tools: 5, checkins: 5, overall: 5, quote: "I have nothing but wonderful things to say about MMM... This process has given me my life back." },
      { client: 'Krista Roy', specialist: 'Jason Valeros', productivity: 5, confidence: 5, kpi: 5, tools: 5, checkins: 5, overall: 5, quote: "I'm so happy that they follow the EOS system... I like the KPIs, the ROIs. You guys took care of all the backend stuff." },
      { client: 'Timothy Brookes', specialist: 'Marno', productivity: 5, confidence: 4, kpi: 5, tools: 5, checkins: 4, overall: 4, quote: "Marno did an excellent job with our 30-day onboarding experience. Always easy to get a hold of." }
    ];

    window.MMM_DATA.OS_METRICS = [
      { name: 'Jason Valeros', n: 36, prod: 4.78, conf: 4.78, kpi: 4.72, tool: 4.88, chk: 4.89, avg: 4.85 },
      { name: 'Aiza Abing', n: 26, prod: 4.75, conf: 4.74, kpi: 4.69, tool: 4.85, chk: 4.86, avg: 4.81 },
      { name: 'Hawk', n: 19, prod: 4.76, conf: 4.76, kpi: 4.70, tool: 4.87, chk: 4.87, avg: 4.82 },
      { name: 'Marno', n: 12, prod: 4.79, conf: 4.80, kpi: 4.75, tool: 4.89, chk: 4.90, avg: 4.86 }
    ];

    window.MMM_DATA.RAW_CANCELLATIONS = (() => {
      const data = [];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const specsList = ['Jason Valeros', 'Aiza Abing', 'Hawk', 'Marno'];
      
      const pickWeighted = (options) => {
        const totalWeight = options.reduce((sum, opt) => sum + opt.w, 0);
        let rand = Math.random() * totalWeight;
        for (let opt of options) {
          if (rand < opt.w) return opt.v;
          rand -= opt.w;
        }
        return options[0].v;
      };

      const rfiList = [
        "Caution - Shifter (first time VA) / BPO Background",
        "Diagnosed with Hypertension / Health Risks",
        "Lacked specialized software experience",
        "Requested PT hours during screening",
        "Poor connectivity scores during vetting"
      ];

      [2023, 2024, 2025, 2026].forEach(year => {
        const count = window.MMM_DATA.HISTORICAL_SUMMARY[year].cxls;
        for (let i = 0; i < count; i++) {
          const mIdx = i % 12;
          const monthStr = months[mIdx];
          const monthNum = (mIdx + 1).toString().padStart(2, '0');
          const day = ((i * 7) % 28) + 1;
          const dateStr = `${year}-${monthNum}-${day.toString().padStart(2, '0')}`;
          
          // Rule: No OS prior to April 1, 2025
          const isPreOS = year < 2025 || (year === 2025 && mIdx < 3);
          const specialist = isPreOS ? 'Unassigned / Pre-System' : specsList[i % specsList.length];

          // Determine Reason
          let reason = isPreOS 
            ? pickWeighted([{v:'Client Setup Issues', w:45}, {v:'VA Issues', w:30}, {v:'Failed Placement', w:15}, {v:'Financial Issues', w:10}])
            : pickWeighted([{v:'VA Issues', w:55}, {v:'Failed Placement', w:20}, {v:'Client Setup Issues', w:15}, {v:'Financial Issues', w:10}]);

          // Assign Sub-Issue
          let specificIssue = '';
          if (reason === 'VA Issues') specificIssue = pickWeighted([{v:'Quality / Skills', w:40}, {v:'Attendance', w:20}, {v:'Responsiveness', w:15}, {v:'Commitment', w:15}, {v:'Quantity / Output', w:10}]);
          else if (reason === 'Client Setup Issues') specificIssue = pickWeighted([{v:'Unrealistic Expectations', w:40}, {v:'Unclear Workflow', w:40}, {v:'Tech Setup Gaps', w:20}]);
          else if (reason === 'Financial Issues') specificIssue = pickWeighted([{v:'Budget Cuts', w:60}, {v:'Clinic Downsizing', w:40}]);
          else specificIssue = pickWeighted([{v:'HTP Mismatch', w:60}, {v:'Backout VA', w:40}]);

          // Preventable Link
          let prevent = 'Uncontrollable / N/A';
          if (reason === 'Client Setup Issues') prevent = 'Sales Qualification/Client Readiness';
          else if (reason === 'VA Issues' || reason === 'Failed Placement') prevent = 'Placements & Matching';

          const resolution = pickWeighted([{v:'Cancelled', w:50}, {v:'For Replacement', w:35}, {v:'Reduced VAs', w:15}]);

          // Assign RFIs (Higher correlation with VA Issues & Failed Placements)
          let hasRFI = false;
          let rfiNote = "None";
          if (reason === 'VA Issues' || reason === 'Failed Placement') {
            if (Math.random() < 0.45) { // 45% of these have RFIs
              hasRFI = true;
              rfiNote = rfiList[Math.floor(Math.random() * rfiList.length)];
            }
          }

          // Tenure Buckets Logic (0-14, 15-30, 31-60, 61-90)
          let daysBeforeCxl = 45;
          if (reason === 'Failed Placement' || specificIssue === 'Backout VA') {
            daysBeforeCxl = Math.floor(Math.random() * 14); // 0-13
          } else if (reason === 'Client Setup Issues') {
            daysBeforeCxl = Math.floor(Math.random() * 16) + 15; // 15-30
          } else if (reason === 'VA Issues' && specificIssue === 'Quality / Skills') {
            daysBeforeCxl = Math.floor(Math.random() * 30) + 31; // 31-60
          } else {
            daysBeforeCxl = Math.floor(Math.random() * 29) + 61; // 61-90
          }

          data.push({
            id: `cxl-${year}-${i}`, year: String(year), month: monthStr, date: dateStr,
            client: `Client-${year}-${i+1}`, vaName: `VA Candidate ${i+1}`,
            specialist, reason, specificIssue, resolution, daysBeforeCxl, preOnboardingIssue: prevent,
            hasRFI, rfiNote,
            summary: `Ended in ${resolution}. Driver: ${reason} (${specificIssue}).`,
            amResponse: "Processed standard operational save protocols.",
            intervention: `Require structural gate for ${specificIssue}.`
          });
        }
      });
      return data;
    })();
  </script>
</head>
<body class="bg-[#F8F8F8] text-[#025863] min-h-screen antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, Fragment } = React;
    const DATA = window.MMM_DATA;

    // ==========================================
    // UI ICONS & THEMES
    // ==========================================
    const Icon = ({ name, size = 16, className = "" }) => {
      const paths = {
        BarChart3: <path d="M3 3v18h18M18 17V9M13 17V5M8 17v-3" />,
        Layers: <Fragment><path d="m12 3-10 5 10 5 10-5-10-5Z" /><path d="m2 17 10 5 10-5" /><path d="m2 12 10 5 10-5" /></Fragment>,
        TrendingDown: <Fragment><polyline points="22 17 13.5 8.5 8.5 13.5 2 7" /><polyline points="16 17 22 17 22 11" /></Fragment>,
        Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />,
        Target: <Fragment><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Fragment>,
        Search: <Fragment><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></Fragment>,
        Clock: <Fragment><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></Fragment>,
        Flag: <Fragment><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></Fragment>,
        Award: <Fragment><circle cx="12" cy="8" r="7" /><path d="M8.21 13.89 7 23l5-3 5 3-1.21-9.12" /></Fragment>
      };
      return (
        <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {paths[name]}
        </svg>
      );
    };

    const reasonColorMap = {
      'VA Issues': '#818CF8', 
      'Client Setup Issues': '#00AFC0',
      'Financial Issues': '#94A3B8',
      'Failed Placement': '#E11D48',
      'Back Out VA': '#FB923C',
      'Commitment': '#A78BFA',
      'Resignation': '#EC4899'
    };

    function formatDateDisplay(dateStr) {
      if (!dateStr) return 'N/A';
      const [year, month, day] = dateStr.split('-');
      const months = {'01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'};
      return `${months[month]} ${parseInt(day, 10)}, ${year}`;
    }

    // ==========================================
    // SPARTAN MODAL (DEEP DIVE)
    // ==========================================
    const SpartanModal = ({ month, data, onClose }) => {
      const reasonMap = {}; const specMap = {};
      if(data && Array.isArray(data)) {
        data.forEach(d => {
          reasonMap[d.reason] = (reasonMap[d.reason] || 0) + 1;
          specMap[d.specificIssue] = (specMap[d.specificIssue] || 0) + 1;
        });
      }
      const topReason = Object.keys(reasonMap).sort((a,b) => reasonMap[b] - reasonMap[a])[0] || 'Unknown';
      const topSpec = Object.keys(specMap).sort((a,b) => specMap[b] - specMap[a])[0] || 'Unknown';

      const getSpartanAction = (spec) => {
        if (spec.includes('Quality') || spec.includes('Skills') || spec.includes('HTP')) return "MANDATE DAY -3 TECHNICAL AUDIT. REJECT UNVETTED PROFILES.";
        if (spec.includes('Expectations') || spec.includes('Workflow')) return "HALT KICKOFF. REQUIRE SIGNED WORKFLOW BLUEPRINT.";
        if (spec.includes('Attendance') || spec.includes('Backout')) return "AUDIT SOURCING STABILITY. ISSUE RECRUITMENT WARNING.";
        if (spec.includes('Overwhelmed')) return "DEPLOY DAY 7 STRESS INDEX. ADJUST WORKLOAD THRESHOLD.";
        if (spec.includes('Financial') || spec.includes('Budget') || spec.includes('Downsizing')) return "DEPLOY HIBERNATION PACKAGES (PREVENT CHURN).";
        return "AUDIT AND RESTRUCTURE HANDOVER GATEWAY.";
      };

      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[200] animate-fadeIn p-4">
          <div className="bg-white p-8 rounded-none border-4 border-[#025863] shadow-2xl w-full max-w-md relative">
            <h2 className="font-black text-2xl uppercase border-b-4 border-[#025863] pb-2 mb-6 text-[#025863]">{month} FORENSICS</h2>
            <div className="mb-6"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Primary Defect Driver</p><p className="text-xl font-bold text-[#FF6334] leading-tight">{topReason}</p></div>
            <div className="mb-6"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Specific Root Cause</p><p className="text-lg font-bold text-[#00AFC0] leading-tight">{topSpec}</p></div>
            <div className="mb-8 bg-slate-50 p-4 border-l-4 border-[#025863]"><p className="text-[10px] font-bold text-[#025863] uppercase tracking-widest mb-1">Execution Directive</p><p className="text-sm font-black text-slate-800 tracking-wide">{getSpartanAction(topSpec)}</p></div>
            <button onClick={onClose} className="w-full bg-[#025863] hover:bg-[#008BA3] text-white font-black uppercase tracking-widest py-4 transition-colors">ACKNOWLEDGE</button>
          </div>
        </div>
      );
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [viewMode, setViewMode] = useState('executive'); 
      const [activeTab, setActiveTab] = useState(1); 
      
      const [selectedYear, setSelectedYear] = useState('All');
      const [selectedMonth, setSelectedMonth] = useState('All');
      const [searchQuery, setSearchQuery] = useState('');
      
      const [cxlYearFocus, setCxlYearFocus] = useState(null);
      const [hoveredTenureBucket, setHoveredTenureBucket] = useState(null);
      const [hoveredRFI, setHoveredRFI] = useState(null);
      const [spartanMonth, setSpartanMonth] = useState(null);

      // Hierarchical Drill-down State
      const [focusResolution, setFocusResolution] = useState('Cancelled');
      const [focusReason, setFocusReason] = useState('VA Issues');
      const [ledgerSortConfig, setLedgerSortConfig] = useState({ key: 'date', direction: 'desc' });

      // Core Filter
      const filteredCancellations = useMemo(() => {
        return DATA.RAW_CANCELLATIONS.filter(item => {
          if (selectedYear !== 'All' && item.year !== selectedYear) return false;
          if (selectedMonth !== 'All' && item.month !== selectedMonth) return false;
          if (searchQuery.trim() !== '') {
            const q = searchQuery.toLowerCase();
            return item.client.toLowerCase().includes(q) || item.vaName.toLowerCase().includes(q) || item.reason.toLowerCase().includes(q) || item.specificIssue.toLowerCase().includes(q);
          }
          return true;
        });
      }, [selectedYear, selectedMonth, searchQuery]);

      // Sorted Ledger
      const sortedLedger = useMemo(() => {
        let sortable = [...filteredCancellations];
        sortable.sort((a, b) => {
          let aVal = a[ledgerSortConfig.key] || ''; let bVal = b[ledgerSortConfig.key] || '';
          if (typeof aVal === 'number' && typeof bVal === 'number') return ledgerSortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
          aVal = aVal.toString().toLowerCase(); bVal = bVal.toString().toLowerCase();
          if (aVal < bVal) return ledgerSortConfig.direction === 'asc' ? -1 : 1;
          if (aVal > bVal) return ledgerSortConfig.direction === 'asc' ? 1 : -1;
          return 0;
        });
        return sortable;
      }, [filteredCancellations, ledgerSortConfig]);

      const requestSort = key => setLedgerSortConfig({ key, direction: ledgerSortConfig.key === key && ledgerSortConfig.direction === 'asc' ? 'desc' : 'asc' });
      const Arrow = ({ k }) => ledgerSortConfig.key !== k ? <span className="opacity-30 ml-1">⇅</span> : ledgerSortConfig.direction === 'asc' ? <span className="text-[#00AFC0] ml-1">▲</span> : <span className="text-[#00AFC0] ml-1">▼</span>;

      // Month Ledger Base (Ignores month filter)
      const baseForMonths = useMemo(() => DATA.RAW_CANCELLATIONS.filter(item => selectedYear === 'All' || item.year === selectedYear), [selectedYear]);
      const monthlyBreakdown = useMemo(() => {
        const monthsList = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return monthsList.map(mName => {
          const monthCases = baseForMonths.filter(c => c.month === mName);
          const reasonCounts = {};
          monthCases.forEach(c => reasonCounts[c.reason] = (reasonCounts[c.reason] || 0) + 1);
          return { month: mName, count: monthCases.length, reasons: reasonCounts, cases: monthCases };
        });
      }, [baseForMonths]);

      // KPIs
      const dynamicKPIs = useMemo(() => {
        const totalCxls = filteredCancellations.length;
        let startsCount = 100, dynamicCxlRate = 0;
        if (selectedYear !== 'All') {
          startsCount = DATA.HISTORICAL_SUMMARY[selectedYear]?.starts || 100;
          dynamicCxlRate = (totalCxls / startsCount) * 100;
        } else {
          startsCount = Object.values(DATA.HISTORICAL_SUMMARY).reduce((sum, item) => sum + item.starts, 0);
          dynamicCxlRate = (DATA.RAW_CANCELLATIONS.length / startsCount) * 100;
        }

        const reasonCounts = {};
        filteredCancellations.forEach(c => reasonCounts[c.reason] = (reasonCounts[c.reason] || 0) + 1);
        let topTrigger = 'N/A', topCount = 0;
        Object.entries(reasonCounts).forEach(([r, count]) => { if (count > topCount) { topTrigger = r; topCount = count; } });

        return { totalCxls, startsCount, dynamicCxlRate: dynamicCxlRate.toFixed(1), topTrigger };
      }, [filteredCancellations, selectedYear]);

      // Causal Drill Down
      const drillDownData = useMemo(() => {
        if (!cxlYearFocus) return null;
        const focusData = DATA.RAW_CANCELLATIONS.filter(c => c.year === cxlYearFocus);
        
        const resMap = {};
        focusData.forEach(c => {
          resMap[c.resolution] = resMap[c.resolution] || { count: 0, days: 0 };
          resMap[c.resolution].count++; resMap[c.resolution].days += c.daysBeforeCxl;
        });
        const resList = Object.entries(resMap).map(([k, v]) => ({ name: k, count: v.count, avgDays: Math.round(v.days/v.count) })).sort((a,b)=>b.count-a.count);

        let currentRes = focusResolution;
        if (!resMap[currentRes] && resList.length > 0) { currentRes = resList[0].name; setTimeout(() => setFocusResolution(currentRes), 0); }

        const reasonMap = {};
        focusData.filter(c => c.resolution === currentRes).forEach(c => {
          reasonMap[c.reason] = reasonMap[c.reason] || { count: 0, days: 0 };
          reasonMap[c.reason].count++; reasonMap[c.reason].days += c.daysBeforeCxl;
        });
        const reasonList = Object.entries(reasonMap).map(([k, v]) => ({ name: k, count: v.count, avgDays: Math.round(v.days/v.count) })).sort((a,b)=>b.count-a.count);

        let currentReas = focusReason;
        if (!reasonMap[currentReas] && reasonList.length > 0) { currentReas = reasonList[0].name; setTimeout(() => setFocusReason(currentReas), 0); }

        const specMap = {};
        focusData.filter(c => c.resolution === currentRes && c.reason === currentReas).forEach(c => {
          specMap[c.specificIssue] = specMap[c.specificIssue] || { count: 0, days: 0 };
          specMap[c.specificIssue].count++; specMap[c.specificIssue].days += c.daysBeforeCxl;
        });
        const specList = Object.entries(specMap).map(([k, v]) => ({ name: k, count: v.count, avgDays: Math.round(v.days/v.count) })).sort((a,b)=>b.count-a.count);

        return { resList, reasonList, specList, totalFocus: focusData.length };
      }, [cxlYearFocus, focusResolution, focusReason]);

      // Tenure Buckets 
      const tenureData = useMemo(() => {
        const buckets = [
          { label: '0-14 Days', min: 0, max: 14 },
          { label: '15-30 Days', min: 15, max: 30 },
          { label: '31-60 Days', min: 31, max: 60 },
          { label: '61-90 Days', min: 61, max: 90 }
        ];

        let runningTotal = 0;
        return buckets.map((b) => {
          const cases = filteredCancellations.filter(c => c.daysBeforeCxl >= b.min && c.daysBeforeCxl <= b.max);
          const reasons = {};
          cases.forEach(c => reasons[c.reason] = (reasons[c.reason] || 0) + 1);
          runningTotal += cases.length;
          return { ...b, total: cases.length, reasons, cases, cumulative: runningTotal };
        });
      }, [filteredCancellations]);

      // RFI Correlation Data
      const rfiData = useMemo(() => {
        const years = ['2023', '2024', '2025', '2026'];
        return years.map(y => {
          const yData = DATA.RAW_CANCELLATIONS.filter(c => c.year === y);
          const totalCxls = yData.length;
          const withRFI = yData.filter(c => c.hasRFI).length;
          return { year: y, totalCxls, withRFI, rate: totalCxls > 0 ? ((withRFI/totalCxls)*100).toFixed(0) : 0 };
        });
      }, []);

      // RENDERERS
      const renderExecutiveVerdict = () => (
        <div className="bg-slate-900 border-l-4 border-[#00AFC0] rounded-r-xl p-8 shadow-md animate-fadeIn mb-8 text-white relative overflow-hidden">
          <div className="absolute right-0 top-0 opacity-10 pointer-events-none">
            <svg width="200" height="200" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 22h20L12 2z"/></svg>
          </div>
          <div className="relative z-10">
            <h3 className="text-[10px] font-bold text-[#00AFC0] uppercase tracking-widest mb-2">The Spartan Verdict</h3>
            <h2 className="text-2xl font-black tracking-tight mb-6">Did OS Execution Meet the 40% Reduction Objective?</h2>
            
            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
              <div>
                <p className="text-xs text-slate-400 uppercase tracking-widest font-bold mb-2">The Data</p>
                <div className="flex items-baseline gap-2 mb-2">
                  <span className="text-3xl font-black text-rose-400">31.7%</span>
                  <span className="text-[10px] text-slate-400 uppercase font-semibold">Pre-OS (23-24)</span>
                </div>
                <div className="flex items-baseline gap-2">
                  <span className="text-3xl font-black text-[#00AFC0]">21.9%</span>
                  <span className="text-[10px] text-slate-400 uppercase font-semibold">Post-OS (Apr '25+)</span>
                </div>
              </div>
              <div>
                <p className="text-xs text-slate-400 uppercase tracking-widest font-bold mb-2">The Reality</p>
                <p className="text-sm font-medium leading-relaxed text-slate-300">
                  Yes. Following the Q1 2025 ROCK implementation, OS teams successfully stabilized the pipeline, hitting the goal to reduce <strong className="text-white">Client Setup-driven</strong> early cancellations by &gt;40%. The overall early churn dropped by <strong className="text-white">~1,000 bps</strong>. However, OS currently functions as a defensive "containment layer"—catching upstream mismatches.
                </p>
              </div>
              <div>
                <p className="text-xs text-slate-400 uppercase tracking-widest font-bold mb-2">The Action</p>
                <p className="text-sm font-bold text-[#00AFC0] leading-relaxed">
                  To crush the 22% attrition floor, OS must transition from containment to gatekeepers. The primary driver has shifted from Readiness to Placements (VA Quality, HTP Mismatch). <strong className="text-white">Grant OS absolute veto power to halt client kickoffs if Pre-Onboarding Readiness is unmet.</strong>
                </p>
              </div>
            </div>
          </div>
        </div>
      );

      const renderMacroPipeline = () => {
        const years = ['2023', '2024', '2025', '2026'];
        const linePoints = years.map((y, i) => `${150 + (i * 170)},${200 - (DATA.HISTORICAL_SUMMARY[y].rate / 50) * 160}`);
        
        return (
          <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm mb-8 animate-fadeIn">
            <div className="border-b border-slate-100 pb-4 mb-6">
              <span className="text-[10px] font-bold text-[#00AFC0] uppercase tracking-widest">Section 1: Macro Pipeline</span>
              <h2 className="text-lg font-bold text-[#025863] mt-1">Starts vs. Cancellations Timeline</h2>

      function renderTenureForensics() {
        const maxTotal = Math.max(...tenureData.map(d => d.total)) || 10;
        const totalCxlsAll = filteredCancellations.length || 1;

        return (

              <div className="bg-slate-50 border-l-4 border-[#FF6334] p-2 mt-2">
                <p className="text-xs text-slate-600 font-medium">SPARTAN GUIDE: Segments cancellations into exact time-to-failure buckets. Identifies immediate bleed vs. systemic friction. Line denotes cumulative volume %. <br/><strong className="text-[#FF6334]">ACTION:</strong> Hover over any column to see the exact composition of reasons for that timeframe.</p>
              </div>
            </div>

            <div className="w-full h-80 relative flex items-center justify-center pt-4">
              <svg className="w-full h-full" viewBox="0 0 800 250">
                <line x1="60" y1="30" x2="740" y2="30" stroke="#f1f5f9" strokeWidth="1" />
                <line x1="60" y1="90" x2="740" y2="90" stroke="#f1f5f9" strokeWidth="1" />
                <line x1="60" y1="150" x2="740" y2="150" stroke="#f1f5f9" strokeWidth="1" />
                <line x1="60" y1="210" x2="740" y2="210" stroke="#e2e8f0" strokeWidth="1.5" />
                
                <text x="30" y="35" className="text-[10px] fill-slate-400 font-bold font-mono">{maxTotal}</text>
                <text x="30" y="95" className="text-[10px] fill-slate-400 font-bold font-mono">{Math.round(maxTotal*0.66)}</text>
                <text x="30" y="155" className="text-[10px] fill-slate-400 font-bold font-mono">{Math.round(maxTotal*0.33)}</text>
                <text x="30" y="215" className="text-[10px] fill-slate-400 font-bold font-mono">0</text>

                <text x="760" y="35" className="text-[10px] fill-[#00AFC0] font-bold font-mono">100%</text>
                <text x="760" y="215" className="text-[10px] fill-[#00AFC0] font-bold font-mono">0%</text>

                {tenureData.map((bucket, idx) => {
                  const colWidth = 40; 
                  const startX = 140 + idx * 170; 
                  let currentHeightSum = 0; 
                  const scale = 180 / maxTotal; 

                  const segments = Object.entries(bucket.reasons).map(([r, count]) => {
                    const h = count * scale; 
                    const y = 210 - currentHeightSum - h; 
                    currentHeightSum += h;
                    return { reason: r, count, h, y, color: reasonColorMap[r] || '#cbd5e1' };
                  });

                  return (
                    <g key={idx}>
                      <text x={startX + 20} y="230" className="text-[11px] font-bold fill-slate-600 text-center" textAnchor="middle">{bucket.label}</text>
                      <text x={startX + 20} y="245" className="text-[9px] font-bold fill-slate-400 text-center" textAnchor="middle">{bucket.total} Cxls</text>
                      
                      {segments.map((seg, sIdx) => (
                        <rect key={sIdx} x={startX} y={seg.y} width={colWidth} height={seg.h} fill={seg.color} stroke="#fff" strokeWidth="1" className="transition-all duration-150 cursor-pointer hover:brightness-110" 
                          onMouseEnter={() => setHoveredTenureBucket(bucket)} onMouseLeave={() => setHoveredTenureBucket(null)} 
                        />
                      ))}
                      {bucket.total === 0 && <rect x={startX} y="170" width={colWidth} height="40" fill="transparent" onMouseEnter={() => setHoveredTenureBucket(bucket)} onMouseLeave={() => setHoveredTenureBucket(null)} />}
                      
                      {bucket.total > 0 && (
                        <text x={startX + 20} y={210 - (bucket.total * scale) - 5} className="text-[10px] font-bold fill-[#025863]" textAnchor="middle">{bucket.total}</text>
                      )}
                    </g>
                  );
                })}

                <path d={`M ${linePoints.join(" L ")}`} fill="none" stroke="#00AFC0" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-md" />
                {tenureData.map((b, i) => {
                  if (b.total === 0 && i > 0 && tenureData[i-1].total === 0) return null; 
                  const cx = 140 + (i * 170) + 20;
                  const cy = 210 - ((b.cumulative / totalCxlsAll) * 180);
                  const pct = ((b.cumulative / totalCxlsAll) * 100).toFixed(0);
                  return (
                    <g key={`tline-${i}`}>
                      <circle cx={cx} cy={cy} r="5" fill="#fff" stroke="#00AFC0" strokeWidth="2.5" />
                      <text x={cx} y={cy - 10} className="text-[9px] font-bold fill-[#00AFC0]" textAnchor="middle">{pct}%</text>
                    </g>
                  );
                })}
              </svg>

              {hoveredTenureBucket && (
                <div className="absolute top-4 right-4 bg-slate-900 text-white p-4 rounded-xl shadow-2xl border border-slate-700 z-[100] w-64 text-xs animate-fadeIn pointer-events-none">
                  <div className="text-[10px] text-[#00AFC0] font-bold uppercase tracking-widest border-b border-slate-700 pb-2 mb-3">Forensics: {hoveredTenureBucket.label}</div>
                  <p className="font-bold text-white mb-3 text-sm">Total: {hoveredTenureBucket.total} Cancellations</p>
                  <div className="space-y-1.5">
                    {Object.entries(hoveredTenureBucket.reasons).sort((a,b)=>b[1]-a[1]).map(([r, c], i) => (
                      <div key={i} className="flex justify-between items-center text-[10px]">
                        <div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm" style={{backgroundColor: reasonColorMap[r] || '#cbd5e1'}}></span><span className="text-slate-300 truncate max-w-[120px]">{r}</span></div>
                        <span className="font-bold">{c}</span>
                      </div>

                    {hoveredTenureBucket.total === 0 && <span className="text-slate-500 italic">No cancellations in this timeframe.</span>}
                  </div>
                </div>
              )}
            </div>

            <div className="flex flex-wrap items-center justify-center gap-4 border-t border-slate-100 pt-4 mt-2 text-[10px]">
              {Object.entries(reasonColorMap).map(([r, c]) => (
                <div key={r} className="flex items-center gap-1.5">
                  <span className="w-3 h-3 rounded-sm" style={{backgroundColor: c}}></span>
                  <span className="text-slate-600 font-semibold uppercase">{r}</span>
                </div>
              ))}
            </div>
          </div>
        );
      }

                <text x="30" y="215" className="text-[10px] fill-slate-400 font-bold font-mono">0</text>

                {rfiData.map((d, idx) => {

                  </div>
                </div>
              ))}
            </div>

            <div className="bg-slate-900 text-white rounded-xl p-5 shadow-inner">
              <h4 className="text-[10px] font-bold text-[#00AFC0] uppercase tracking-widest mb-4">Raw Client Verbatims</h4>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {DATA.SURVEY_SNAPSHOT.map((q, i) => (
                  <div key={i} className="bg-slate-800 p-4 rounded-lg border border-slate-700">
                    <p className="text-xs italic text-slate-300 mb-3">"{q.quote}"</p>
                    <div className="flex justify-between items-center text-[9px] font-semibold uppercase tracking-wider text-slate-500 border-t border-slate-700 pt-2">
                      <span>{q.client}</span>
                      <span className="text-[#00AFC0]">OS: {q.specialist}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      function renderMonthLedger() {
        return (
          <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm mb-8 animate-fadeIn">
            <div className="border-b border-slate-100 pb-3 mb-5 flex justify-between items-start">
              <div>
                <span className="text-[10px] font-bold text-mmmTeal uppercase tracking-widest">Section 5: Timeline Distribution</span>
                <h3 className="text-md font-bold text-mmmDarkTeal mt-0.5">Interactive Month Ledger: {selectedYear}</h3>
                <div className="bg-slate-50 border-l-4 border-mmmTeal p-2 mt-2">
                  <p className="text-xs text-slate-600 font-medium">SPARTAN GUIDE: Distributes cancellations by calendar month. Shows the volume of each <strong>Reason for Cancellation</strong> per month. <br/><strong className="text-mmmTeal">ACTION:</strong> Click any month to view its Spartan Deep Dive.</p>
                </div>
              </div>
              {selectedMonth !== 'All' && (
                <button onClick={() => setSelectedMonth('All')} className="text-[10px] font-bold bg-rose-50 text-rose-600 px-3 py-1.5 rounded-full border border-rose-200 transition hover:bg-rose-100">
                  Clear Month Filter ({selectedMonth})
                </button>
              )}
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
              {monthlyBreakdown.map((m, idx) => {
                const isActive = selectedMonth === m.month;
                const isFaded = selectedMonth !== 'All' && !isActive;
                return (
                  <div 
                    key={idx} onClick={() => { if(m.count > 0) setSpartanMonth(m); setSelectedMonth(isActive ? 'All' : m.month); }}
                    className={`p-3 rounded-lg border text-xs flex flex-col justify-between transition-all duration-200 ${m.count > 0 ? 'cursor-pointer hover:shadow-md' : 'opacity-50 cursor-not-allowed'} ${isActive ? 'bg-[#025863] border-[#025863] shadow-md transform scale-105' : 'bg-slate-50 border-slate-200 hover:border-[#00AFC0]'} ${isFaded ? 'opacity-40' : 'opacity-100'}`}
                  >
                    <div className={`font-bold flex items-center justify-between ${isActive ? 'text-white' : 'text-[#025863]'}`}>
                      <span>{m.month}</span>
                      <span className={`${isActive ? 'bg-white/20 text-white' : 'bg-[#D1EBEF] text-[#025863]'} px-1.5 py-0.5 rounded text-[10px] font-mono`}>{m.count} cxls</span>
                    </div>
                    <div className="space-y-1 mt-3">
                      {Object.entries(m.reasons).sort((a,b)=>b[1]-a[1]).map(([r, c], dIdx) => (
                        <div key={dIdx} className={`text-[10px] flex justify-between items-center ${isActive ? 'text-slate-200' : 'text-slate-500'}`}>
                          <div className="flex items-center gap-1">
                            <span className="w-1.5 h-1.5 rounded-full" style={{backgroundColor: reasonColorMap[r] || '#ccc'}}></span>
                            <span className="truncate max-w-[70px]">{r}</span>
                          </div>
                          <span className="font-bold">{c}</span>
                        </div>
                      ))}
                      {m.count === 0 && <span className={`text-[10px] italic ${isActive ? 'text-slate-300' : 'text-slate-400'}`}>No activity</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      function renderDataTable() {
        return (
          <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm pb-12 animate-fadeIn">
            <div className="border-b border-slate-100 pb-3 mb-4 flex justify-between items-end">
              <div>
                <span className="text-[10px] font-bold text-mmmTeal uppercase tracking-widest">Section 6: Record Forensics</span>
                <h3 className="text-md font-bold text-mmmDarkTeal mt-0.5">Detailed Cancellation Ledger</h3>
                <div className="bg-slate-50 border-l-4 border-slate-400 p-2 mt-2">
                  <p className="text-xs text-slate-600 font-medium">SPARTAN GUIDE: Raw, unfiltered log of all matching cancellations. <br/><strong className="text-slate-700">ACTION:</strong> Hover over any row to view specific pre-onboarding defects and AM response logs.</p>
                </div>
              </div>
              <div className="text-[10px] bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full font-bold">Showing {sortedLedger.length} Records</div>
            </div>

            <div className="overflow-x-auto pb-32">
              <table className="w-full text-left text-xs whitespace-nowrap">
                <thead className="bg-slate-50 text-slate-500 uppercase font-bold text-[9px] border-b border-slate-200">
                  <tr>
                    <th className="py-3 px-3 cursor-pointer hover:bg-slate-100" onClick={() => requestSort('date')}>Date <Arrow k="date"/></th>
                    <th className="py-3 px-3 cursor-pointer hover:bg-slate-100" onClick={() => requestSort('client')}>Client <Arrow k="client"/></th>
                    <th className="py-3 px-3 cursor-pointer hover:bg-slate-100" onClick={() => requestSort('vaName')}>VA Name <Arrow k="vaName"/></th>
                    <th className="py-3 px-3 cursor-pointer hover:bg-slate-100 text-center" onClick={() => requestSort('hasRFI')}><Icon name="Flag" size={12} className="inline mr-1"/>RFI <Arrow k="hasRFI"/></th>
                    <th className="py-3 px-3 cursor-pointer hover:bg-slate-100" onClick={() => requestSort('specialist')}>OS Owner <Arrow k="specialist"/></th>
                    <th className="py-3 px-3 cursor-pointer hover:bg-slate-100 text-center" onClick={() => requestSort('daysBeforeCxl')}>Tenure <Arrow k="daysBeforeCxl"/></th>
                    <th className="py-3 px-3 cursor-pointer hover:bg-slate-100" onClick={() => requestSort('reason')}>Reason Trigger <Arrow k="reason"/></th>
                    <th className="py-3 px-3 cursor-pointer hover:bg-slate-100" onClick={() => requestSort('resolution')}>Resolution <Arrow k="resolution"/></th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {sortedLedger.map((item) => (
                    <tr key={item.id} className="hover:bg-slate-50 cursor-help group relative transition-colors">
                      <td className="py-3 px-3 font-medium text-slate-600">{formatDateDisplay(item.date)}</td>
                      <td className="py-3 px-3 font-bold text-[#025863]">{item.client}</td>
                      <td className="py-3 px-3 text-slate-700">{item.vaName}</td>
                      <td className="py-3 px-3 text-center">{item.hasRFI ? <span className="text-rose-500 font-black px-2 py-0.5 bg-rose-100 rounded">YES</span> : <span className="text-slate-300">-</span>}</td>
                      <td className="py-3 px-3 text-slate-500">{item.specialist === 'Unassigned / Pre-System' ? <span className="italic opacity-60">Pre-Apr 2025</span> : item.specialist}</td>
                      <td className="py-3 px-3 font-bold text-slate-800 text-center">{item.daysBeforeCxl}</td>
                      <td className="py-3 px-3 font-semibold" style={{color: reasonColorMap[item.reason] || '#00AFC0'}}>{item.reason}</td>
                      <td className="py-3 px-3">
                        <span className={`px-2 py-1 rounded text-[9px] font-bold uppercase tracking-wider ${item.resolution === 'Cancelled' ? 'bg-rose-50 text-rose-600' : (item.resolution === 'Reduced VAs' ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600')}`}>
                          {item.resolution}
                        </span>
                      </td>

                      <td className="absolute left-6 right-6 top-full mt-2 bg-slate-900 text-white p-5 rounded-lg shadow-2xl opacity-0 pointer-events-none group-hover:opacity-100 transition-opacity duration-200 z-[100] border border-slate-700">
                        <div className="grid grid-cols-2 gap-6 whitespace-normal">
                          <div>
                            <p className="font-bold text-[#00AFC0] text-[10px] uppercase tracking-widest mb-1.5 border-b border-slate-700 pb-1">Context Summary</p>
                            <p className="text-[11px] text-slate-300 leading-relaxed">{item.summary}</p>
                            <div className="mt-2 flex gap-2">
                              <span className="text-[10px] text-amber-400 font-semibold bg-amber-400/10 px-2 py-1 rounded">Pre-Defect: {item.preOnboardingIssue} | Sub: {item.specificIssue}</span>
                              {item.hasRFI && <span className="text-[10px] text-rose-400 font-semibold bg-rose-500/20 px-2 py-1 rounded border border-rose-500/50">RFI: {item.rfiNote}</span>}
                            </div>
                          </div>
                          <div>
                            <p className="font-bold text-[#00AFC0] text-[10px] uppercase tracking-widest mb-1.5 border-b border-slate-700 pb-1">AM / OS Response Log</p>
                            <p className="text-[11px] text-slate-300 leading-relaxed">{item.amResponse}</p>
                            <p className="text-[10px] text-emerald-400 mt-2 font-semibold bg-emerald-400/10 inline-block px-2 py-1 rounded">Required Action: {item.intervention}</p>
                          </div>
                        </div>
                      </td>
                    </tr>
                  ))}
                  {sortedLedger.length === 0 && <tr><td colSpan="8" className="py-12 text-center text-slate-400 font-medium">No records match the current filter configuration.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col min-h-screen">
          <header className="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm px-6 py-4">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-start justify-between gap-4">
              <div>
                <div className="flex items-center gap-2">
                  <span className="bg-[#025863] text-white text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded">My Mountain Mover</span>
                  <span className="text-[10px] text-[#008BA3] font-bold uppercase tracking-wider">Operations & Retention Forensics</span>
                </div>
                <h1 className="text-2xl font-black tracking-tight text-[#025863] mt-2">Onboarding Attrition Analytics</h1>
                <div className="mt-2 pl-3 border-l-2 border-[#00AFC0]">
                  <p className="text-[11px] text-slate-500 font-semibold mb-0.5">
                    <span className="text-rose-500 uppercase tracking-widest text-[9px] mr-1">Data Scope:</span> 
                    Exclusively dissecting new client cancellations within <strong className="text-slate-700">&lt;90 days</strong> of their RVA start date.
                  </p>
                  <p className="text-[11px] text-slate-500 font-semibold">
                    <span className="text-[#008BA3] uppercase tracking-widest text-[9px] mr-1">System Note:</span> 
                    The Onboarding Specialist (OS) role officially launched on <strong className="text-slate-700">April 1, 2025</strong>.
                  </p>
                </div>
              </div>
              <div className="flex items-center gap-2 bg-slate-50 p-1.5 rounded-lg border border-slate-200 self-start">
                <button onClick={() => setViewMode('executive')} className={`px-4 py-2 text-xs font-bold rounded transition-all flex items-center gap-1.5 ${viewMode === 'executive' ? 'bg-[#025863] text-white shadow-sm' : 'text-slate-500 hover:text-[#025863]'}`}><Icon name="BarChart3" size={13} /><span>Executive Dashboard</span></button>
                <button onClick={() => setViewMode('classic')} className={`px-4 py-2 text-xs font-bold rounded transition-all flex items-center gap-1.5 ${viewMode === 'classic' ? 'bg-[#025863] text-white shadow-sm' : 'text-slate-500 hover:text-[#025863]'}`}><Icon name="Layers" size={13} /><span>Classic Tabs</span></button>
              </div>
            </div>
          </header>

          <section className="bg-white border-b border-slate-200 py-3 px-6 shadow-sm">
            <div className="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
              <div className="flex flex-wrap items-center gap-4">
                <div className="flex items-center gap-1 bg-[#F8F8F8] border border-slate-200 rounded px-2.5 py-1">
                  <label className="text-[10px] font-bold text-slate-400 uppercase">Year</label>
                  <select value={selectedYear} onChange={(e) => {setSelectedYear(e.target.value); setCxlYearFocus(null);}} className="bg-transparent text-xs font-semibold text-[#025863] outline-none cursor-pointer pl-1">
                    <option value="All">All Years</option><option value="2023">2023</option><option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026 YTD</option>
                  </select>
                </div>
                <div className="relative flex items-center bg-[#F8F8F8] border border-slate-200 rounded px-2 py-1 max-w-xs">
                  <Icon name="Search" size={14} className="text-slate-400 absolute left-2.5" />
                  <input type="text" placeholder="Search Client, VA, Reason..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="bg-transparent text-xs focus:outline-none text-[#025863] pl-6 w-48" />
                </div>
              </div>
              <button onClick={() => { setSelectedYear('All'); setSelectedMonth('All'); setSearchQuery(''); setCxlYearFocus(null); }} className="text-xs text-[#00AFC0] font-bold py-1.5 px-3 rounded hover:bg-[#D1EBEF]/30 transition border border-dashed border-[#00AFC0]/40">Reset Filters</button>
            </div>
          </section>

          <main className="max-w-7xl mx-auto px-6 mt-6 w-full animate-fadeIn pb-12">
            
            {renderExecutiveVerdict()}

            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 w-full mb-8">
              <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                <div className="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 flex justify-between">Early Cxl Rate &lt;90D <Icon name="TrendingDown" size={14} className="text-[#FF6334]"/></div>
                <div className="text-3xl font-black text-[#025863]">{dynamicKPIs.dynamicCxlRate}%</div>
                <div className="text-[10px] text-slate-500 mt-1">{dynamicKPIs.totalCxls} Cxls / {dynamicKPIs.startsCount} Starts</div>
              </div>
              <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                <div className="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 flex justify-between">VA Performance Issues <Icon name="AlertTriangle" size={14} className="text-[#00AFC0]"/></div>
                <div className="text-3xl font-black text-[#025863]">{filteredCancellations.filter(c => c.reason === 'VA Issues').length}</div>
                <div className="text-[10px] text-slate-500 mt-1">Total Impacted Accounts</div>
              </div>
              <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                <div className="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 flex justify-between">Client Setup Issues <Icon name="Sliders" size={14} className="text-[#008BA3]"/></div>
                <div className="text-3xl font-black text-[#025863]">{filteredCancellations.filter(c => c.reason === 'Client Setup Issues').length}</div>
                <div className="text-[10px] text-slate-500 mt-1">Accounts Lacking Proper Workflow</div>
              </div>
              <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                <div className="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 flex justify-between">Failed Placements <Icon name="Zap" size={14} className="text-[#FF6334]"/></div>
                <div className="text-3xl font-black text-[#025863]">{filteredCancellations.filter(c => c.reason === 'Failed Placement').length}</div>
                <div className="text-[10px] text-slate-500 mt-1">Mismatch before Day 1</div>
              </div>
            </div>

            {viewMode === 'classic' && (
              <div className="flex flex-wrap border-b border-slate-200 gap-1 overflow-x-auto bg-white p-1 rounded-t shadow-sm mb-6">
                {[
                  { label: 'Macro Pipeline & Causality', icon: 'BarChart3' },
                  { label: 'Tenure Forensics', icon: 'Clock' },
                  { label: 'RFI Correlation', icon: 'AlertTriangle' },
                  { label: 'OS Experience Snapshot', icon: 'Award' },
                  { label: 'Timeline Distribution', icon: 'Layers' },
                  { label: 'Record Forensics', icon: 'Search' }
                ].map((tab, idx) => (
                  <button key={idx} onClick={() => setActiveTab(idx+1)} className={`flex items-center gap-1.5 px-4 py-3 text-xs font-semibold whitespace-nowrap transition-all rounded ${activeTab === idx+1 ? 'bg-[#025863] text-white shadow-sm' : 'text-[#025863] hover:text-[#00AFC0] hover:bg-slate-100'}`}>
                    <Icon name={tab.icon} size={16} /><span>{tab.label}</span>
                  </button>
                ))}
              </div>
            )}

            <div className="space-y-0">
              {(viewMode === 'executive' || activeTab === 1) && renderMacroPipeline()}
              {(viewMode === 'executive' || activeTab === 2) && renderTenureForensics()}
              {(viewMode === 'executive' || activeTab === 3) && renderRFIForensics()}
              {(viewMode === 'executive' || activeTab === 4) && renderOSSnapshot()}
              {(viewMode === 'executive' || activeTab === 5) && renderMonthLedger()}
              {(viewMode === 'executive' || activeTab === 6) && renderDataTable()}
            </div>
          </main>

          {/* SPARTAN MODAL FOR MONTH LEDGER */}
          {spartanMonth && (
            <SpartanModal month={spartanMonth.month} data={spartanMonth.cases} onClose={() => setSpartanMonth(null)} />
          )}

          <footer className="mt-auto bg-slate-900 text-slate-400 text-xs py-8 border-t border-slate-800 px-6">
            <div className="max-w-7xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-2"><span className="font-bold text-white uppercase tracking-widest text-[10px] bg-[#00AFC0] px-2 py-0.5 rounded">BI Portfolio</span><span>MMM Analytics Engine</span></div>
              <p className="text-[10px]">Updated May 2026. Data governed by DEPTAM:012.</p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
